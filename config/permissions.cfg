### =====================================================
### Olympus RolePlay — vMenu permissions
### Μόνο staff/admins (group.admin) έχουν πρόσβαση στο vMenu.
### Εκτελείται από το server.cfg με: exec config/permissions.cfg
### =====================================================

# Ενεργοποιεί το ACE-based permission system του vMenu.
# (αν είναι false, ΟΛΟΙ οι παίκτες μπορούν να κάνουν σχεδόν τα πάντα — ΜΗΝ το αλλάξεις)
setr vmenu_use_permissions true

# Μόνο παίκτες με το permission "vMenu.Staff" μπορούν να ανοίξουν καν το μενού.
# Αυτό είναι το βασικό staff-only lock που προτείνει και η ίδια η vMenu.
setr vmenu_menu_staff_only true

# ---------------------------------------------------
# ACE Permissions
# Μόνο το group.admin παίρνει permissions παρακάτω.
# Δεν δίνεται ΚΑΝΕΝΑ permission σε builtin.everyone ή σε άλλο group —
# άρα οποιοσδήποτε παίκτης δεν ανήκει στο group.admin δεν έχει καμία πρόσβαση.
# ---------------------------------------------------

# Επιτρέπει στο group.admin να περάσει το staff-only gate (vmenu_menu_staff_only).
add_ace group.admin "vMenu.Staff" allow

# Δίνει στο group.admin πρόσβαση σε όλα τα vMenu submenus/features ΕΚΤΟΣ από το
# VoiceChat. ΔΕΝ χρησιμοποιούμε "vMenu.Everything" επίτηδες: είναι master-switch που
# ενεργοποιεί ΚΑΙ το vMenu voice chat (με το "Currently Talking" overlay), αγνοώντας
# οποιοδήποτε deny. Επειδή το voice το κάνει το pma-voice, δίνουμε τα υπόλοιπα ένα-ένα.
add_ace group.admin "vMenu.OnlinePlayers.All"   allow
add_ace group.admin "vMenu.PlayerOptions.All"   allow
add_ace group.admin "vMenu.VehicleOptions.All"  allow
add_ace group.admin "vMenu.VehicleSpawner.All"  allow
add_ace group.admin "vMenu.SavedVehicles.All"   allow
add_ace group.admin "vMenu.PersonalVehicle.All" allow
add_ace group.admin "vMenu.PlayerAppearance.All" allow
add_ace group.admin "vMenu.TimeOptions.All"     allow
add_ace group.admin "vMenu.WeatherOptions.All"  allow
add_ace group.admin "vMenu.WeaponOptions.All"   allow
add_ace group.admin "vMenu.WeaponLoadouts.All"  allow
add_ace group.admin "vMenu.Misc.All"            allow
add_ace group.admin "vMenu.NoClip"              allow
# ΣΗΜΕΙΩΣΗ: το vMenu.VoiceChat.* ΔΕΝ δίνεται επίτηδες (χρησιμοποιούμε pma-voice).

# Προστατεύει τους admins από kick/ban μέσω του Online Players menu άλλων staff.
add_ace group.admin "vMenu.DontKickMe" allow
add_ace group.admin "vMenu.DontBanMe" allow
